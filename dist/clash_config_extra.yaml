- name: 🚀 节点选择
  type: select
  proxies:
  - ♻️ 自动选择
  - 🔯 故障转移
  - 🔮 负载均衡(轮询)
  - 🔮 负载均衡(轮询无香港)
  - 🔮 负载均衡(散列)
  - 🇭🇰 香港节点
  - 🇹🇼 台湾节点
  - 🇸🇬 狮城节点
  - 🇯🇵 日本节点
  - 🇺🇲 美国节点
