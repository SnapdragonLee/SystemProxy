  - 🇸🇬 狮城节点
  - 🇯🇵 日本节点
  - 🇲🇾 马来西亚节点
  - 🇮🇩 印度尼西亚节点
  strategy: round-robin
  interval: 300
  tolerance: 60
  lazy: true
- name: 🔮 负载均衡(散列)
  type: load-balance
  include-all: true
  strategy: consistent-hashing
  interval: 300
  tolerance: 60
  lazy: true
