  - DIRECT
- name: 🚀 手动切换
  include-all: true
  type: select
- name: ♻️ 自动选择
  type: url-test
  include-all: true
  interval: 300
  tolerance: 60
- name: 🔯 故障转移
  type: fallback
  include-all: true
  interval: 300
  tolerance: 60
- name: 🔮 负载均衡(轮询)
  type: load-balance
  include-all: true
  strategy: round-robin
  interval: 300
  tolerance: 60
  lazy: true
- name: 🔮 负载均衡(轮询无香港)
  type: load-balance
  include-all: false
  proxies:
  - 🇺🇲 美国节点
